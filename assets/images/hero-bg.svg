<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">温暖的漫画校园</title>
  <desc id="desc">阳光、云层、教学楼、操场、树木与纸飞机组成的原创校园插画，不含文字和人物正脸。</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0.78" y2="1">
      <stop offset="0" stop-color="#bcd8d4"/>
      <stop offset="0.52" stop-color="#e7e5c9"/>
      <stop offset="1" stop-color="#f4d6a6"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fff9c9" stop-opacity="0.95"/>
      <stop offset="0.35" stop-color="#ffe48c" stop-opacity="0.68"/>
      <stop offset="1" stop-color="#ffe6a1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="building" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7e6c7"/>
      <stop offset="1" stop-color="#d8b88d"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a7c3bd"/>
      <stop offset="0.48" stop-color="#dbe3d1"/>
      <stop offset="1" stop-color="#7f9d94"/>
    </linearGradient>
    <linearGradient id="field" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9eb685"/>
      <stop offset="1" stop-color="#657f58"/>
    </linearGradient>
    <linearGradient id="track" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d79363"/>
      <stop offset="1" stop-color="#b96f4b"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="160%">
      <feDropShadow dx="0" dy="15" stdDeviation="14" flood-color="#4e5747" flood-opacity="0.24"/>
    </filter>
    <filter id="paper" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.68" numOctaves="2" seed="25" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="gray"/>
      <feComponentTransfer in="gray" result="fade">
        <feFuncA type="table" tableValues="0 0.055"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="fade" mode="multiply"/>
    </filter>
    <clipPath id="canvas"><rect width="1920" height="1080"/></clipPath>
  </defs>

  <g clip-path="url(#canvas)" filter="url(#paper)">
    <rect width="1920" height="1080" fill="url(#sky)"/>

    <!-- 阳光和手绘光束 -->
    <circle cx="1550" cy="178" r="330" fill="url(#sunGlow)"/>
    <circle cx="1550" cy="178" r="78" fill="#fff4b3" opacity="0.72"/>
    <path d="M1486 235 950 890M1555 250 1290 990M1616 232l88 670" fill="none" stroke="#fff8cb" stroke-width="75" stroke-linecap="round" opacity="0.1"/>

    <!-- 漫画云层 -->
    <g fill="#fffdf4" stroke="#78958c" stroke-width="3" opacity="0.72">
      <path d="M70 214c28-53 91-56 125-21 28-78 145-71 161 12 57-29 118 8 116 62H57c-8-20-3-39 13-53Z"/>
      <path d="M1001 109c18-42 66-54 101-26 26-65 122-57 134 14 52-22 99 9 98 54H989c-5-15-1-30 12-42Z" opacity="0.65"/>
      <path d="M1460 376c17-37 61-48 93-22 24-58 108-49 119 13 45-20 87 9 86 48h-310c-5-15-1-28 12-39Z" opacity="0.4"/>
    </g>
    <g fill="none" stroke="#76918b" stroke-width="3" stroke-linecap="round" opacity="0.36">
      <path d="M108 281c83 13 190 10 308-3"/>
      <path d="M1030 166c69 9 151 8 250-4"/>
    </g>

    <!-- 远景树带 -->
    <path d="M0 715c104-64 175-45 263-83 83-36 160-25 247 18 101-73 225-79 335-6 87-54 185-56 278 10 97-65 196-63 285 9 84-54 184-49 269 8 93-48 169-41 243 10v399H0Z" fill="#78936a" opacity="0.82"/>
    <path d="M0 755c124-55 233-58 330-16 103-61 220-54 325 4 128-60 262-57 382 1 99-46 213-37 303 19 99-48 207-34 296 13 108-39 193-25 284 24v280H0Z" fill="#627a58" opacity="0.74"/>

    <!-- 教学楼主体，细节集中于右侧 -->
    <g filter="url(#shadow)">
      <path d="M1075 398h711v425h-711Z" fill="url(#building)" stroke="#765f4e" stroke-width="6"/>
      <path d="M1038 379h785l-43 48h-705Z" fill="#ab785b" stroke="#765f4e" stroke-width="6" stroke-linejoin="round"/>
      <path d="M1162 300h511l81 79h-676Z" fill="#d89769" stroke="#765f4e" stroke-width="6" stroke-linejoin="round"/>
      <path d="M1195 327h452l28 29h-510Z" fill="#f0d6ae" opacity="0.72"/>
      <path d="M1075 548h711M1075 680h711" stroke="#886c56" stroke-width="6"/>
      <path d="M1115 430h87v83h-87ZM1251 430h87v83h-87ZM1387 430h87v83h-87ZM1523 430h87v83h-87ZM1659 430h87v83h-87Z" fill="url(#glass)" stroke="#6f7569" stroke-width="4"/>
      <path d="M1115 574h87v80h-87ZM1251 574h87v80h-87ZM1387 574h87v80h-87ZM1523 574h87v80h-87ZM1659 574h87v80h-87Z" fill="url(#glass)" stroke="#6f7569" stroke-width="4"/>
      <path d="M1115 705h87v81h-87ZM1251 705h87v81h-87ZM1523 705h87v81h-87ZM1659 705h87v81h-87Z" fill="url(#glass)" stroke="#6f7569" stroke-width="4"/>
      <path d="M1387 702h87v121h-87Z" fill="#705f51" stroke="#594a41" stroke-width="4"/>
      <path d="M1430 702v121" stroke="#a9987f" stroke-width="3"/>
      <g stroke="#f8f2d9" stroke-width="3" opacity="0.65">
        <path d="M1158 430v83M1294 430v83M1430 430v83M1566 430v83M1702 430v83"/>
        <path d="M1158 574v80M1294 574v80M1430 574v80M1566 574v80M1702 574v80"/>
      </g>
    </g>

    <!-- 校园小路与操场 -->
    <path d="M0 824c354-93 742-107 1154-44 261 40 517 39 766-10v310H0Z" fill="url(#field)"/>
    <path d="M-90 1000c353-230 711-261 1075-91 293 136 608 131 1024-5v230H-90Z" fill="url(#track)" stroke="#8e614a" stroke-width="7"/>
    <g fill="none" stroke="#f5ddb4" stroke-width="4" opacity="0.72">
      <path d="M-51 1061c375-236 714-251 1062-91 273 126 576 122 953 0"/>
      <path d="M-13 1114c363-217 693-230 1030-76 267 122 562 120 925 8"/>
    </g>
    <path d="M749 1080c156-166 335-261 536-284 93-11 192-9 298 6-109 34-210 75-301 124-84 45-161 97-230 154Z" fill="#e8d9bb" opacity="0.9"/>

    <!-- 前景树木 -->
    <g stroke="#4e6847" stroke-linecap="round" stroke-linejoin="round">
      <path d="M183 971c19-156 21-267 6-335" stroke="#6d5b45" stroke-width="29"/>
      <path d="M189 762c-36-52-70-83-104-96M191 712c37-65 74-104 111-117M186 827c-52-38-99-58-140-60" fill="none" stroke="#6d5b45" stroke-width="15"/>
      <g fill="#66815b" stroke-width="5">
        <path d="M43 677c-2-76 90-118 145-67 28-72 139-59 145 26 69 2 91 88 32 124-67 42-283 30-328-16-22-22-19-48 6-67Z"/>
        <path d="M-32 752c15-63 95-83 134-36 25-57 109-42 111 25 58 8 68 79 18 103-55 27-222 13-259-27-18-20-20-42-4-65Z" fill="#77936a"/>
      </g>
    </g>
    <g transform="translate(1810 80) scale(.72)" opacity="0.92">
      <path d="M0 1010c-6-163-1-282 14-356" fill="none" stroke="#675743" stroke-width="35"/>
      <path d="M8 774c-47-52-91-81-132-87M10 716c42-71 87-112 135-123" fill="none" stroke="#675743" stroke-width="17" stroke-linecap="round"/>
      <path d="M-166 657c8-89 113-128 174-65 41-74 153-43 145 52 77 21 78 119 4 139-82 23-291-7-326-67-12-20-11-40 3-59Z" fill="#58724f" stroke="#405c42" stroke-width="6"/>
    </g>

    <!-- 白色栅栏 -->
    <g fill="none" stroke="#f5efdc" stroke-width="8" opacity="0.87">
      <path d="M814 831c260 12 493 7 701-18"/>
      <path d="M814 876c260 12 493 7 701-18"/>
      <path d="M846 816v78M936 820v78M1027 823v79M1118 824v79M1209 823v78M1300 820v78M1391 816v77M1482 809v76"/>
    </g>

    <!-- 青春元素：纸飞机、书页和光点 -->
    <g fill="#fffdf2" stroke="#647c71" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.82">
      <path d="m788 245 126-47-69 101-28-45-29-9Z"/>
      <path d="m817 254 97-56-76 74" fill="none"/>
    </g>
    <g fill="none" stroke="#fff9d2" stroke-width="4" stroke-linecap="round" opacity="0.7">
      <path d="M714 355c49 10 83 3 102-21"/>
      <path d="M653 394c23 4 39 0 48-12"/>
      <path d="M925 184c27-15 47-34 61-59"/>
    </g>
    <g fill="#fff8bd" opacity="0.8">
      <circle cx="635" cy="255" r="7"/><circle cx="984" cy="289" r="5"/><circle cx="1327" cy="167" r="6"/><circle cx="1498" cy="318" r="4"/><circle cx="547" cy="515" r="5"/>
    </g>
    <g fill="#fffdf4" stroke="#8e9f7e" stroke-width="3" opacity="0.72">
      <path d="M502 304c28-13 55-12 81 4-24 6-40 17-50 34-5-19-15-31-31-38Z"/>
      <path d="M610 451c22-10 43-9 64 3-18 5-31 14-39 27-3-15-12-25-25-30Z"/>
    </g>

    <!-- 轻微漫画速度线 -->
    <g fill="none" stroke="#fffdf1" stroke-width="3" stroke-linecap="round" opacity="0.35">
      <path d="M80 425h155M55 454h106M325 340h127M347 369h70M1193 256h124"/>
    </g>
  </g>
</svg>
